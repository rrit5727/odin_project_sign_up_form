<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>My test page</title>
    <link rel="stylesheet" href="sign-up-form.css">
  </head>
  <body>
    <div class="overall-container">
      <div class="image-containers">
        <img src="image.avif" class="background-image" alt="">
        <div class="odin-logo-container">
          <img src="odin-lined.png" class="odin-logo" alt="">
        </div>
      </div>
      <div class="form-section-container">
        <div class="form-section-text-container">
          <p class="form-section-text">
            This is not a real online service! You know you need something like this in your life to help you realise your deepest dreams. Sign up now and get started!
          </p>
          <p class="form-section text">
            You know you want to.
          </p>
        </div>
        <div class="form-container">
          <form action="" class="form-section-form">
            <legend class="form-legend">Let's do this!</legend>
            <div class="form-control-container">
              <fieldset class="form-row">
                <div>
                  <label for="first-name">First Name</label>
                  <input type="text" id="first-name" name="">
                </div>
                <div>
                  <label for="last-name">Last Name</label>
                  <input type="text" id="last-name" name="">
                </div>
              </fieldset>
              <fieldset class="form-row">
                <div>
                  <label for="email">Email</label>
                  <input type="text" id="email" name="">
                </div>
                <div>
                  <label for="phone">Phone</label>
                  <input type="text" id="phone" name="">
                </div>
              </fieldset>
              <fieldset class="form-row">
                <div>
                  <label for="password">Password</label>
                  <input type="text" id="password" name="">
                </div>
                <div>
                  <label for="confirm-password">Confirm Password</label>
                  <input type="text" id="confirm-password" name="">
                </div>
              </fieldset>
              <div class="button-container">
                <button>ABC</button>
              </div>

            </div>
          </form>
        </div>
        <div class="footer">
          <p class="footer-text">Already have an account? Log in</p>
        </div>
      </div>

    </div>
  </body>
</html>
